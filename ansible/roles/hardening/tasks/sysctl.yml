---
- name: Deploy sysctl hardening config
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Apply sysctl settings
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false
