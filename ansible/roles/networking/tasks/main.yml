---
- name: Install netplan
  ansible.builtin.apt:
    name: netplan.io
    state: present

- name: Disable default cloud-init network config
  ansible.builtin.file:
    path: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    state: touch
    mode: "0644"

- name: Remove existing Netplan configs
  ansible.builtin.shell:
    cmd: find /etc/netplan -name '*.yaml' -not -name '50-custom.yaml' -exec mv {} {}.bak \;
  changed_when: false

- name: Deploy Netplan config
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/50-custom.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan

- name: Configure VLAN sub-interface IP and route via systemd-networkd
  ansible.builtin.copy:
    dest: "/etc/systemd/network/10-{{ internal_interface }}.{{ internal_vlan_id }}.network"
    mode: "0644"
    content: |
      [Match]
      Name={{ internal_interface }}.{{ internal_vlan_id }}

      [Network]
      Address={{ internal_ip }}/29

      [Route]
      Destination={{ internal_device_ip }}/32
      Scope=link
  notify: Restart networkd

- name: Remove conflicting systemd-networkd files from previous runs
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/network/10-{{ internal_interface }}.{{ internal_vlan_id }}-routes.network
    - /etc/systemd/network/20-{{ internal_interface }}.{{ internal_vlan_id }}.netdev
    - /etc/systemd/network/20-{{ internal_interface }}.{{ internal_vlan_id }}.network
    - /etc/systemd/network/20-{{ internal_interface }}.network
  notify: Restart networkd

- name: Apply IP immediately
  ansible.builtin.command:
    cmd: "ip addr replace {{ internal_ip }}/29 dev {{ internal_interface }}.{{ internal_vlan_id }}"
  changed_when: true

- name: Apply host route immediately
  ansible.builtin.command:
    cmd: "ip route replace {{ internal_device_ip }}/32 dev {{ internal_interface }}.{{ internal_vlan_id }}"
  changed_when: true
